name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: pekagius/meilisearchsyncservice

permissions:
  contents: write
  packages: write

jobs:
  release:
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    outputs:
      new_release: ${{ steps.semantic.outputs.new_release_published }}
      new_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: cycjimmy/semantic-release-action@v4
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: [release]
    if: always() && (needs.release.result == 'success' || needs.release.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "should_push=true" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.release.outputs.new_release }}" == "true" ]]; then
            VERSION="${{ needs.release.outputs.new_version }}"
            echo "should_push=true" >> $GITHUB_OUTPUT
          else
            echo "should_push=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tags=$REGISTRY/$IMAGE_NAME:${VERSION},$REGISTRY/$IMAGE_NAME:${MAJOR_MINOR},$REGISTRY/$IMAGE_NAME:latest" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        if: steps.version.outputs.should_push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.version.outputs.should_push == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.version.outputs.should_push == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.version.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
